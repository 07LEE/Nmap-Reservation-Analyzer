name: Naver Map Reservation Auto Collector

on:
  schedule:
    - cron: '0 14 * * *' # Every day at 23:00 KST (14:00 UTC)
  workflow_dispatch: # Support manual trigger

jobs:
  collect-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Write permission to commit and push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Checkout full history

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Install dependencies clean

      - name: Run collector script
        run: npm start # Run data collection

      - name: Commit and push collected data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage all collected CSV data
          git add data/*.csv
          
          # Commit and push only if changes exist
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-collect reservation data [skip ci]"
            git push origin main
          else
            echo "No data changes detected. Skipping push."
          fi
